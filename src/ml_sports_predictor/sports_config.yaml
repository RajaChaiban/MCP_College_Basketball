sports:
  cbb:
    name: "NCAA Men's Basketball"
    game_duration_minutes: 40
    period_count: 2
    period_names: ["1st Half", "2nd Half"]
    scoring_units: "points"
    typical_score_range: [0, 150]
    positions: ["PG", "SG", "SF", "PF", "C"]
    conferences: ["ACC", "Big Ten", "SEC", "Pac-12", "Big 12", "AAC", "Mountain West", "WCC"]
    ranking_systems: ["ap_poll", "coaches_poll", "net_rankings"]
    predictor:
      features: ["score_diff", "momentum", "strength_diff", "time_ratio", "mins_remaining", "period"]
      model_path: "cbb_predictor_bundle_2025_26_safe.joblib"
      calibration: "isotonic"
      ensemble_weights:
        lr: 0.5
        xgb: 0.5
    data_sources:
      primary: "espn"
      fallback: ["ncaa", "sportsdv", "cbbpy"]

  soccer:
    name: "Soccer (International)"
    game_duration_minutes: 90
